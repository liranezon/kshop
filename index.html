<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-Shop – ניהול מלאי</title>

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    input[type="file"]::file-selector-button {
      background: #111827; color: white; border: none;
      padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    input[type="file"]::file-selector-button:hover { background: #374151; }

    /* ── Toast notifications ──────────────────────── */
    @keyframes toast-in {
      from { transform: translateY(-110%); opacity: 0; }
      to   { transform: translateY(0);      opacity: 1; }
    }
    @keyframes toast-out {
      from { transform: translateY(0);      opacity: 1; }
      to   { transform: translateY(-110%); opacity: 0; }
    }
    .toast-enter { animation: toast-in  0.28s cubic-bezier(.21,1.02,.73,1) forwards; }
    .toast-exit  { animation: toast-out 0.22s ease-in forwards; }

    /* ── Modal animations ──────────────────────── */
    @keyframes modal-backdrop-in {
      from { background-color: rgba(0,0,0,0); }
      to   { background-color: rgba(0,0,0,0.5); }
    }
    @keyframes modal-backdrop-in-60 {
      from { background-color: rgba(0,0,0,0); }
      to   { background-color: rgba(0,0,0,0.6); }
    }
    @keyframes modal-panel-in {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    .modal-backdrop   { animation: modal-backdrop-in    0.2s ease forwards; }
    .modal-backdrop-60{ animation: modal-backdrop-in-60 0.2s ease forwards; }
    .modal-panel      { animation: modal-panel-in 0.25s cubic-bezier(.21,1.02,.73,1) forwards; }

    /* ── Print / PDF styles ────────────────────── */
    @media print {
      body > #root       { display: none !important; }
      body > #kshop-print-catalog { display: block !important; }
      @page { margin: 0; size: A4 portrait; }
    }
    #kshop-print-catalog { display: none; direction: rtl; }
    #kshop-print-catalog * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

    /* ── wrapper */
    .pc-wrap { padding: 8mm 10mm 10mm; background: #fff; min-height: 100vh; }

    /* ── header */
    .pc-header {
      display: flex;
      direction: ltr;
      align-items: stretch;
      justify-content: space-between;
      border-bottom: 3px solid #cc0000;
      padding-bottom: 10px;
      margin-bottom: 12px;
    }
    .pc-logo-wrap { display: flex; align-items: center; gap: 8px; }
    .pc-logo-img  { height: 52px; width: auto; object-fit: contain; }
    .pc-logo-k    { font-size: 32px; font-weight: 900; color: #cc0000; line-height: 1; }
    .pc-logo-s    { font-size: 22px; font-style: italic; font-weight: 700; color: #1a1a1a; line-height: 1; }
    .pc-header-title { text-align: right; direction: rtl; display: flex; flex-direction: column; justify-content: center; }
    .pc-catalog-title { font-size: 17px; font-weight: 800; color: #1a1a1a; }
    .pc-catalog-subtitle { font-size: 11px; color: #888; margin-top: 3px; }
    .pc-catalog-date  { font-size: 10px; color: #aaa; margin-top: 2px; }

    /* ── divider line */
    .pc-section-label {
      font-size: 10px;
      font-weight: 700;
      color: #cc0000;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      padding-right: 2px;
      direction: rtl;
    }

    /* ── table */
    .pc-table {
      width: 100%;
      border-collapse: collapse;
      direction: rtl;
      font-size: 12px;
      border: 1.5px solid #ddd;
      border-radius: 4px;
      overflow: hidden;
    }
    .pc-table thead tr { background: #cc0000; color: #fff; }
    .pc-table thead th {
      padding: 9px 10px;
      font-size: 11px;
      font-weight: 700;
      text-align: right;
      border-left: 1px solid #e05555;
      white-space: nowrap;
    }
    .pc-table thead th:last-child { border-left: none; }
    .pc-table thead th.col-num   { text-align: center; width: 28px; }
    .pc-table thead th.col-img   { text-align: center; width: 68px; }
    .pc-table thead th.col-price { text-align: center; width: 82px; }

    /* category row */
    .pc-cat-row td {
      background: #f5f5f5;
      color: #cc0000;
      font-weight: 700;
      font-size: 11px;
      padding: 5px 10px;
      text-align: right;
      border-top: 1.5px solid #ddd;
      border-bottom: 1px solid #e0e0e0;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* data rows */
    .pc-table tbody tr.pc-row { page-break-inside: avoid; }
    .pc-table tbody tr.pc-row:nth-child(odd)  { background: #fff; }
    .pc-table tbody tr.pc-row:nth-child(even) { background: #fdf5f5; }
    .pc-table tbody tr.pc-row td {
      padding: 7px 10px;
      border-bottom: 1px solid #ebebeb;
      border-left: 1px solid #f0f0f0;
      vertical-align: middle;
      text-align: right;
    }
    .pc-table tbody tr.pc-row td:last-child { border-left: none; }
    .pc-table tbody tr.pc-row:last-child td { border-bottom: none; }

    /* row number cell */
    .pc-row-num { text-align: center !important; color: #bbb; font-size: 10px; font-weight: 600; }

    /* image cell */
    .pc-row-img {
      width: 58px; height: 44px;
      object-fit: cover;
      border-radius: 5px;
      display: block; margin: 0 auto;
      border: 1px solid #eee;
    }
    .pc-row-img-placeholder {
      width: 58px; height: 44px;
      background: #f8f8f8;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      margin: 0 auto;
      border: 1px solid #eee;
    }
    .pc-row-name  { font-weight: 700; color: #1a1a1a; font-size: 13px; }
    .pc-row-dims  { font-size: 10px; color: #999; margin-top: 2px; }

    /* price cell */
    .pc-price-cell { text-align: center !important; }
    .pc-price-num   { font-size: 15px; font-weight: 900; color: #cc0000; display: block; line-height: 1.2; }
    .pc-price-unit  { font-size: 9px; color: #bbb; display: block; margin-top: 1px; }
    .pc-price-empty { color: #ddd; font-size: 11px; }

    /* ── footer */
    .pc-footer {
      border-top: 2px solid #cc0000;
      margin-top: 12px;
      padding-top: 8px;
      display: flex;
      direction: ltr;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: #999;
    }
    .pc-footer-contact { direction: rtl; text-align: right; }
    .pc-footer-contact strong { color: #cc0000; font-size: 12px; }
    .pc-footer-brand { font-size: 9px; color: #ccc; }
  </style>
</head>

    const SUPABASE_URL = 'https://vtrzxykuhacrlqzgdbfe.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0cnp4eWt1aGFjcmxxemdkYmZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MzYxMzcsImV4cCI6MjA5MjIxMjEzN30.oGuQKHmaMyiZOPvNyis637fMY8fOD5kQWSjjCLTozfQ';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function cloudLoad() {
      try {
        const { data: prods, error: pErr } = await db
          .from('products')
          .select('*')
          .order('display_order', { ascending: true });
        if (pErr) throw pErr;

        const { data: settings, error: sErr } = await db.from('app_settings').select('*');
        if (sErr) throw sErr;

        const cfg = {};
        (settings || []).forEach(s => {
          try { cfg[s.key] = JSON.parse(s.value); } catch { cfg[s.key] = s.value; }
        });

        return {
          products:       prods || [],
          categories:     cfg.categories     || [],
          warehouses:     cfg.warehouses     || [],
          whatsappNumber: cfg.whatsappNumber || '',
          serverURL:      cfg.serverURL      || '',
          logoUrl:        cfg.logoUrl        || ''
        };
      } catch(e) {
        console.error('cloudLoad error:', e.message);
        throw e;
      }
    }

    async function cloudSave(data) {
      // אל תשמור לפני שהטעינה מהענן הסתיימה — מונע דריסת נתוני ענן בנתוני localStorage ישנים
      if (!cloudDataLoaded) {
        console.warn('cloudSave: נחסם — טעינת ענן טרם הסתיימה');
        return true;
      }
      // בדוק session — אם אין משתמש מחובר, אל תנסה לכתוב (RLS יחסום)
      const { data: { session } } = await db.auth.getSession();
      if (!session) {
        console.warn('cloudSave: אין session מאומת — שמירה מקומית בלבד');
        return true;
      }

      // שמירת מוצרים (upsert בלבד — מחיקה רק דרך cloudDeleteProduct)
      if (data.products && data.products.length > 0) {
        const withOrder = data.products.map((p, i) => ({ ...p, display_order: i }));
        const { error: uErr } = await db.from('products').upsert(withOrder, { onConflict: 'id' });
        if (uErr) throw uErr;
      }

      // שמירת הגדרות
      const rows = [];
      if (data.categories)               rows.push({ key: 'categories',      value: JSON.stringify(data.categories) });
      if (data.warehouses)               rows.push({ key: 'warehouses',       value: JSON.stringify(data.warehouses) });
      if (data.whatsappNumber !== undefined) rows.push({ key: 'whatsappNumber', value: JSON.stringify(data.whatsappNumber) });
      if (data.logoUrl        !== undefined) rows.push({ key: 'logoUrl',        value: JSON.stringify(data.logoUrl) });
      if (rows.length) {
        const { error } = await db.from('app_settings').upsert(rows, { onConflict: 'key' });
        if (error) throw error;
      }
      return true;
    }

    // ─────────────────────────────────────────
    // Contacts CRUD
    // ─────────────────────────────────────────
    async function contactsLoad() {
      try {
        const { data } = await db.from('contacts').select('*').order('name');
        return data || [];
      } catch { return []; }
    }
    async function contactUpsert(contact) {
      return db.from('contacts').upsert(contact, { onConflict: 'id' });
    }
    async function contactDelete(id) {
      return db.from('contacts').delete().eq('id', id);
    }

    async function cloudDeleteProduct(id) {
      const { data: { session } } = await db.auth.getSession();
      if (!session) return;
      await db.from('products').delete().eq('id', id);
    }

      if (!cloudDataLoaded) {
        console.warn('debouncedCloudSave: ממתין לטעינת ענן — נדחה');
        return;

      clearTimeout(cloudSaveTimer);

        cloudSave({

          categories: categories || JSON.parse(localStorage.getItem('kshop_categories') || '[]'),

      }, 1500);

    // localStorage helpers
    // ─────────────────────────────────────────
    const loadProducts = () => {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          const parsed = JSON.parse(stored);
          if (parsed.length > 0) return parsed;
        }
        // First run – seed from site data
        persistProducts(SEED_PRODUCTS);
        return SEED_PRODUCTS;
      } catch { return SEED_PRODUCTS; }
    };
    const persistProducts = (list) => localStorage.setItem(STORAGE_KEY, JSON.stringify(list));

    // ─────────────────────────────────────────
    // עזרים
    // ─────────────────────────────────────────
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);

    const productStatus = (p) => {
      if (p.quantity > 2)
        return { key: 'ok',      label: '✅ במלאי',       cls: 'bg-green-100 text-green-700' };
      if (p.quantity > 0)
        return { key: 'low',     label: '⚠️ מלאי נמוך',   cls: 'bg-yellow-100 text-yellow-700' };
      if ((p.futureQty || 0) > 0)
        return { key: 'future',  label: '⏳ מגיע בקרוב',  cls: 'bg-orange-100 text-orange-700' };
      return   { key: 'out',     label: '❌ אזל',          cls: 'bg-red-100 text-red-700' };
    };

    const fmtDate = (d) => d ? new Date(d).toLocaleDateString('he-IL') : '';

    const buildWhatsAppText = (products) => {
      const lines = products.map((p) => {
        const s = productStatus(p);
        let statusLine =
          s.key === 'future'
            ? `מגיע בקרוב${p.futureDate ? ' (' + fmtDate(p.futureDate) + ')' : ''}`
            : s.key === 'out'
            ? 'אזל מהמלאי'
            : 'זמין במלאי';
        return `*${p.name}*\nמידות: ${p.dimensions || '—'}\n${statusLine}`;
      });
      return `שלום! הנה המוצרים שביקשת:\n\n${lines.join('\n\n')}\n\nלפרטים נוספים והזמנה - נשמח לעזור!`;
    };

      const [pw,      setPw]      = useState('');
      const [err,     setErr]     = useState('');
      const [loading, setLoading] = useState(false);

      const doLogin = async (e) => {
        e.preventDefault();
        setErr('');
        if (!email || !pw) { setErr('יש למלא מייל וסיסמה'); return; }
        setLoading(true);
        const { data, error } = await db.auth.signInWithPassword({ email: email.trim(), password: pw });
        setLoading(false);
        if (error) { setErr('מייל או סיסמה שגויים'); setPw(''); return; }
        onLogin(data.user);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-gray-50 via-white to-gray-100 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-xs text-center">
            <div className="text-5xl mb-3">🔐</div>
            <h1 className="text-2xl font-bold text-gray-800 mb-1">K-Shop</h1>
            <p className="text-gray-400 text-sm mb-6">כניסת מנהל</p>

            <form onSubmit={doLogin} className="space-y-3">
              <input
                autoFocus type="email" placeholder="כתובת מייל"
                value={email} dir="ltr"
                onChange={e => { setEmail(e.target.value); setErr(''); }}
                className="w-full border border-gray-200 rounded-xl px-4 py-3 text-center text-sm
                           focus:outline-none focus:ring-2 focus:ring-gray-400" />
              <input
                type="password" placeholder="סיסמה"
                value={pw}
                onChange={e => { setPw(e.target.value); setErr(''); }}
                className="w-full border border-gray-200 rounded-xl px-4 py-3 text-center text-base
                           focus:outline-none focus:ring-2 focus:ring-gray-400" />
              {err && <p className="text-red-500 text-sm">{err}</p>}
              <button type="submit" disabled={loading}
                className="w-full bg-gray-900 hover:bg-gray-700 disabled:opacity-50 text-white
                           font-semibold py-3 rounded-xl transition-colors">
                {loading ? '⏳ ...' : 'כניסה'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────
    // קומפוננטה: CategoryFilter
    // ─────────────────────────────────────────
    function CategoryFilter({ active, onChange, categories = CATEGORIES, adminMode = false, onAddCategory = null }) {
      return (
        <div className="flex gap-2 overflow-x-auto pb-1 hide-scrollbar items-center">
          {categories.map(c => (
            <button key={c.key} onClick={() => onChange(c.key)}
              className={`flex-shrink-0 px-3 py-1.5 rounded-full text-sm font-medium transition-colors
                ${active === c.key
                  ? 'bg-gray-900 text-white shadow-sm'
                  : 'bg-white text-gray-600 border border-gray-200 hover:border-gray-300'}`}>
              {c.label}
            </button>
          ))}
          {adminMode && onAddCategory && (
            <button onClick={onAddCategory}
              className="flex-shrink-0 px-3 py-1.5 rounded-full text-sm font-medium bg-white text-gray-700
                         border border-gray-300 hover:bg-gray-50 transition-colors whitespace-nowrap">
              ➕ קטגוריה
            </button>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────
    // קומפוננטה: ProductCard
    // ─────────────────────────────────────────
    function ProductCard({ product, selected, onToggle, adminMode, onEdit, onQuantityChange, onDragStart, onDragOver, onDrop, warehouses = DEFAULT_WAREHOUSES }) {
      const s  = productStatus(product);
      const wqty = getWqty(product);
      const allEntries       = warehouses.map(w => ({ ...w, qty: wqty[w.key] || 0 }));
      const warehouseEntries = allEntries.filter(w => w.qty > 0);
      const whFallback = warehouseEntries.length === 0 && product.warehouse
        ? [{ ...(warehouses.find(w => w.key === product.warehouse) || {}), qty: product.quantity || 0 }].filter(w => w.key)
        : null;
      const [whPopup, setWhPopup] = useState(null); // null | 'plus' | 'minus'
      // + מציג את כל המחסנים, − מציג רק אלה עם מלאי
      const popupEntries = whPopup === 'plus'
        ? allEntries
        : (warehouseEntries.length > 0 ? warehouseEntries : (whFallback || allEntries));

      const handlePM = (e, delta) => {
        e.stopPropagation();
        setWhPopup(delta === -1 ? 'minus' : 'plus');
      };

      const handleWhChoice = (e, whKey, delta) => {
        e.stopPropagation();
        onQuantityChange(product.id, delta, whKey);
        setWhPopup(null);
      };

      return (
        <div
          draggable={adminMode}
          onDragStart={(e) => { if (onDragStart) onDragStart(e, product); }}
          onDragOver={(e) => { if (onDragOver && adminMode) onDragOver(e); }}
          onDrop={(e) => { if (onDrop) onDrop(e, product); }}
          onClick={() => onToggle(product.id)}
          className={`bg-white rounded-2xl shadow-sm overflow-hidden cursor-pointer
            transition-all duration-200 select-none relative group
            ${selected
              ? 'ring-2 ring-gray-900 shadow-lg shadow-gray-200'
              : 'hover:shadow-lg hover:shadow-gray-200/80 hover:scale-[1.015] hover:-translate-y-0.5'}
            ${adminMode ? 'cursor-grab active:cursor-grabbing' : ''}`}>

          {/* תמונה */}
          <div className="relative aspect-square bg-gray-100">
            {product.image
              ? <img src={product.image} alt={product.name} className="w-full h-full object-cover" />
              : <div className="w-full h-full flex items-center justify-center">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="#d1d5db" strokeWidth="1.5">
                  <rect x="6" y="10" width="36" height="28" rx="4"/>
                  <circle cx="18" cy="22" r="4"/>
                  <path d="M6 32l10-8 8 8 6-5 12 9"/>
                </svg>
              </div>
            }

            {/* Handle - ניידות במצב ניהול */}
            {adminMode && (
              <div className="absolute top-2 right-2 bg-gray-600/70 text-white px-2 py-1 rounded
                             text-xs opacity-0 group-hover:opacity-100 transition-opacity cursor-grab
                             active:cursor-grabbing" title="גרור לשינוי סדר">
                ≡
              </div>
            )}

            {/* תג סטטוס */}
            <span className={`absolute top-2 left-2 text-xs font-medium px-2 py-0.5 rounded-full ${s.cls}`}>
              {s.label}
            </span>

            {/* V כשנבחר */}
            {selected && (
              <div className="absolute inset-0 bg-gray-500/10 flex items-end justify-end p-2">
                <div className="bg-gray-900 text-white rounded-full w-7 h-7 flex items-center
                                justify-center text-base font-bold shadow-lg">✓</div>
              </div>
            )}

            {/* כפתור עריכה - רק במצב ניהול */}
            {adminMode && (
              <button
                onClick={e => { e.stopPropagation(); onEdit(product); }}
                className="absolute bottom-2 right-2 bg-white/90 hover:bg-white rounded-full w-7 h-7
                           flex items-center justify-center shadow text-sm transition-colors">
                ✏️
              </button>
            )}
          </div>

          {/* תוכן */}
          <div className="p-3">
            <h3 className="font-bold text-gray-800 text-sm leading-tight">{product.name}</h3>
            {product.dimensions &&
              <p className="text-gray-500 text-xs mt-0.5">{product.dimensions}</p>}

            {/* מידע ניהולי – רק במצב ניהול */}
            {adminMode && (
              <div className="mt-2 pt-2 border-t border-gray-100 space-y-1 text-xs">
                {/* מחסנים + כמויות */}
                {(() => {
                  const entries = warehouseEntries.length > 0 ? warehouseEntries : (whFallback || []);
                  return entries.length > 0 ? (
                    <div>
                      <span className="text-gray-400 text-xs">מחסן</span>
                      <div className="flex flex-wrap gap-1 mt-1">
                        {entries.map(w => (
                          <span key={w.key}
                            className="inline-flex items-center gap-1 bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-full font-medium">
                            {w.label}
                            <span className="bg-slate-300 text-slate-700 rounded-full px-1.5 font-bold">{w.qty}</span>
                          </span>
                        ))}
                      </div>
                    </div>
                  ) : null;
                })()}
                {/* כפתורי +/- מלאי מהיר + popup בחירת מחסן */}
                <div className="relative" onClick={e => e.stopPropagation()}>
                  {/* popup בחירת מחסן */}
                  {whPopup && (
                    <div className="absolute bottom-9 right-0 left-0 bg-white rounded-xl border border-gray-200
                                    shadow-lg z-20 p-2 text-xs"
                         onClick={e => e.stopPropagation()}>
                      <p className="text-gray-400 text-center mb-2">
                        {whPopup === 'minus' ? 'מאיזה מחסן להוריד?' : 'לאיזה מחסן להוסיף?'}
                      </p>
                      {popupEntries.map(w => (
                        <button key={w.key}
                          onClick={e => handleWhChoice(e, w.key, whPopup === 'minus' ? -1 : +1)}
                          disabled={whPopup === 'minus' && w.qty <= 0}
                          className="w-full flex justify-between items-center px-2 py-1.5 rounded-lg
                                     hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed
                                     transition-colors mb-0.5">
                          <span className="text-gray-700 font-medium">{w.label}</span>
                          <span className="text-gray-700 font-bold">{w.qty} יח׳</span>
                        </button>
                      ))}
                      <button onClick={e => { e.stopPropagation(); setWhPopup(null); }}
                        className="w-full text-center text-gray-400 text-xs mt-1 py-1 hover:text-gray-600">
                        ביטול
                      </button>
                    </div>
                  )}
                  <div className="flex items-center justify-between">
                    <span className="text-gray-400 text-xs">סה"כ</span>
                    <div className="flex items-center gap-1">
                      <button
                        onClick={e => handlePM(e, -1)}
                        disabled={product.quantity <= 0}
                        className={`w-6 h-6 rounded-lg flex items-center justify-center font-bold
                                   text-gray-500 disabled:opacity-30 disabled:cursor-not-allowed
                                   transition-colors text-base leading-none
                                   ${whPopup === 'minus'
                                     ? 'bg-gray-100 text-gray-700'
                                     : 'bg-gray-100 hover:bg-red-100 hover:text-red-600'}`}>
                        −
                      </button>
                      <span className="font-bold text-gray-800 w-6 text-center text-xs">
                        {product.quantity ?? 0}
                      </span>
                      <button
                        onClick={e => handlePM(e, +1)}
                        className={`w-6 h-6 rounded-lg flex items-center justify-center font-bold
                                   text-gray-500 transition-colors text-base leading-none
                                   ${whPopup === 'plus'
                                     ? 'bg-gray-100 text-gray-700'
                                     : 'bg-gray-100 hover:bg-green-100 hover:text-green-600'}`}>
                        +
                      </button>
                    </div>
                  </div>
                </div>
                {product.sku && (
                  <div className="flex justify-between">
                    <span className="text-gray-400">מק"ט</span>
                    <span className="text-gray-500 font-mono text-xs">{product.sku}</span>
                  </div>
                )}
                {product.costPrice > 0 && (
                  <div className="flex justify-between">
                    <span className="text-gray-400">עלות</span>
                    <span className="font-semibold text-gray-700">₪{Number(product.costPrice).toLocaleString()}</span>
                  </div>
                )}
                {(product.futureQty || 0) > 0 && (
                  <div className="text-orange-600 pt-0.5">
                    📦 {product.futureQty} יח׳ מגיעות
                    {product.futureDate && ` – ${fmtDate(product.futureDate)}`}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────
    // קומפוננטה: QRPanel – סריקת QR לחיבור
    // ─────────────────────────────────────────
    function QRPanel({ serverUrl, onConnected }) {
      const [qrImg,  setQrImg]  = useState(null);
      const [loading, setLoading] = useState(true);
      const [error,   setError]   = useState('');
      const pollRef = useRef(null);

      const fetchQR = async () => {
        try {
          const r = await fetch(serverUrl + '/qr', { signal: AbortSignal.timeout(8000), headers: { 'ngrok-skip-browser-warning': 'true', 'x-kshop-token': getToken() } });
          const d = await r.json();
          if (d.status === 'ready') { clearInterval(pollRef.current); onConnected(); return; }
          if (d.qr) { setQrImg(d.qr); setLoading(false); }
          else { setLoading(false); setError('QR לא זמין עדיין…'); }
        } catch (e) {
          setLoading(false); setError('שגיאה בטעינת QR: ' + e.message);
        }
      };

      useEffect(() => {
        fetchQR();
        pollRef.current = setInterval(fetchQR, 4000);
        return () => clearInterval(pollRef.current);
      }, []);

      return (
        <div className="p-6 text-center space-y-4">
          <p className="font-semibold text-gray-700">סרוק עם הוואטסאפ העסקי שלך</p>
          {loading && <div className="text-4xl animate-spin inline-block">⏳</div>}
          {error   && <p className="text-orange-500 text-sm">{error}</p>}
          {qrImg   && <img src={qrImg} alt="QR" className="mx-auto rounded-xl border-2 border-gray-200 w-56 h-56 object-contain" />}
          {qrImg   && <p className="text-xs text-gray-400">לאחר הסריקה הדף יתעדכן אוטומטית</p>}
        </div>
      );
    }

    // ─────────────────────────────────────────
    // ─────────────────────────────────────────
    // קומפוננטה: ContactPicker
    // ─────────────────────────────────────────
    function ContactPicker({ onSelect }) {
      const [contacts,     setContacts]     = useState([]);
      const [query,        setQuery]        = useState('');
      const [selected,     setSelected]     = useState(null);
      const [open,         setOpen]         = useState(false);
      const [showSaveForm, setShowSaveForm] = useState(false);
      const [newName,      setNewName]      = useState('');
      const [saving,       setSaving]       = useState(false);
      const inputRef = useRef();

      useEffect(() => { contactsLoad().then(setContacts); }, []);

      // סגור dropdown בלחיצה מחוץ
      useEffect(() => {
        const handler = (e) => {
          if (inputRef.current && !inputRef.current.closest('.cp-wrap').contains(e.target))
            setOpen(false);
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const digits = query.replace(/\D/g, '');
      const filtered = query.length > 0
        ? contacts.filter(c => {
            const nameMatch  = c.name.toLowerCase().includes(query.toLowerCase());
            const phoneMatch = digits.length > 0 && c.phone.replace(/\D/g,'').includes(digits);
            return nameMatch || phoneMatch;
          })
        : contacts;

      const isPhoneQuery = /^[\d\s\-\+\(\)]{7,}$/.test(query.trim());
      const alreadySaved = contacts.some(c => c.phone.replace(/\D/g,'') === query.replace(/\D/g,''));

      const select = (contact) => {
        setSelected(contact); setQuery(''); setOpen(false); setShowSaveForm(false);
        onSelect(contact.phone, contact.name);
      };

      const clear = () => { setSelected(null); setQuery(''); onSelect('', ''); };

      const saveNew = async () => {
        if (!newName.trim()) return;
        setSaving(true);
        const contact = { id: uid(), name: newName.trim(), phone: query.replace(/\D/g,'') };
        await contactUpsert(contact);
        setContacts(prev => [...prev, contact].sort((a,b) => a.name.localeCompare(b.name, 'he')));
        select(contact);
        setShowSaveForm(false); setNewName(''); setSaving(false);
      };

      return (
        <div className="cp-wrap relative">
          {selected ? (
            <div className="flex items-center gap-3 border-2 border-green-400 bg-green-50
                            rounded-xl px-4 py-3">
              <div className="w-9 h-9 rounded-full bg-green-200 flex items-center justify-center
                              text-green-800 font-bold text-sm flex-shrink-0">
                {selected.name.charAt(0)}
              </div>
              <div className="flex-1 min-w-0">
                <p className="font-semibold text-gray-800 text-sm leading-tight">{selected.name}</p>
                <p className="text-xs text-gray-500 font-mono" dir="ltr">{selected.phone}</p>
              </div>
              <button onClick={clear}
                className="text-gray-400 hover:text-red-500 text-2xl leading-none flex-shrink-0">
                ×
              </button>
            </div>
          ) : (
            <>
              <div className="relative" ref={inputRef}>
                <input
                  autoFocus
                  type="text"
                  placeholder="חפש שם או הכנס מספר..."
                  value={query}
                  onChange={e => { setQuery(e.target.value); setOpen(true); setSendError && setSendError(''); }}
                  onFocus={() => setOpen(true)}
                  onKeyDown={e => {
                    if (e.key === 'Enter' && filtered.length === 1) select(filtered[0]);
                    if (e.key === 'Escape') setOpen(false);
                  }}
                  className="w-full border border-gray-200 rounded-xl px-4 py-3 text-base
                             focus:outline-none focus:ring-2 focus:ring-green-300"
                />
                {query && (
                  <button onClick={() => { setQuery(''); setOpen(false); }}
                    className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400
                               hover:text-gray-600 text-xl leading-none">
                    ×
                  </button>
                )}
              </div>

              {open && (
                <div className="absolute top-full left-0 right-0 mt-1 bg-white border border-gray-200
                                rounded-xl shadow-xl z-30 max-h-52 overflow-y-auto">
                  {filtered.length > 0
                    ? filtered.map(c => {
                      // הדגשת החלק שמתאים
                      const hi = (str, q) => {
                        if (!q) return str;
                        const idx = str.toLowerCase().indexOf(q.toLowerCase());
                        if (idx === -1) return str;
                        return [str.slice(0, idx), <strong key="h" className="text-gray-700">{str.slice(idx, idx + q.length)}</strong>, str.slice(idx + q.length)];
                      };
                      const phoneStr = c.phone;
                      const phoneHi  = digits.length > 0 ? hi(phoneStr, digits) : phoneStr;
                      return (
                        <button key={c.id} onClick={() => select(c)}
                          className="w-full flex justify-between items-center px-4 py-3
                                     hover:bg-gray-50 transition-colors border-b border-gray-50 last:border-0">
                          <div className="flex items-center gap-2">
                            <div className="w-7 h-7 rounded-full bg-gray-100 flex items-center
                                            justify-center text-gray-700 font-bold text-xs flex-shrink-0">
                              {c.name.charAt(0)}
                            </div>
                            <span className="font-medium text-gray-800 text-sm">{hi(c.name, query)}</span>
                          </div>
                          <span className="text-gray-400 text-xs font-mono" dir="ltr">{phoneHi}</span>
                        </button>
                      );
                    })
                    : query.length > 0 && !isPhoneQuery && (
                        <p className="text-center text-gray-400 text-sm py-4">לא נמצאו תוצאות</p>
                      )
                  }
                  {isPhoneQuery && !alreadySaved && !showSaveForm && (
                    <button onClick={() => { setShowSaveForm(true); setOpen(false); }}
                      className="w-full py-3 px-4 text-sm text-gray-700 hover:bg-gray-50
                                 border-t border-gray-100 font-medium transition-colors flex items-center gap-2">
                      <span className="text-lg">+</span> שמור {query} כאיש קשר
                    </button>
                  )}
                  {isPhoneQuery && (
                    <button onClick={() => { onSelect(query.replace(/\D/g,''), ''); setOpen(false); }}
                      className="w-full py-3 px-4 text-sm text-gray-500 hover:bg-gray-50
                                 border-t border-gray-100 transition-colors">
                      שלח למספר {query} ללא שמירה
                    </button>
                  )}
                </div>
              )}

              {showSaveForm && (
                <div className="mt-2 bg-gray-50 rounded-xl p-3 flex gap-2 items-center">
                  <input autoFocus placeholder="שם איש הקשר" value={newName}
                    onChange={e => setNewName(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && saveNew()}
                    className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm
                               focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white" />
                  <button onClick={saveNew} disabled={saving || !newName.trim()}
                    className="px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium
                               hover:bg-gray-700 disabled:opacity-50 whitespace-nowrap">
                    {saving ? '...' : 'שמור'}
                  </button>
                  <button onClick={() => setShowSaveForm(false)}
                    className="text-gray-400 hover:text-gray-600 text-xl leading-none px-1">×</button>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────
    // ContactPickerWithAdd — ContactPicker + כפתור הוספה מהירה
    // ─────────────────────────────────────────
    function ContactPickerWithAdd({ onSelect, sendError }) {
      const [showAdd, setShowAdd]   = useState(false);
      const [addName, setAddName]   = useState('');
      const [addPhone, setAddPhone] = useState('');
      const [saving, setSaving]     = useState(false);
      const [contacts, setContacts] = useState([]);
      const [refreshKey, setRefreshKey] = useState(0);

      useEffect(() => { contactsLoad().then(setContacts); }, [refreshKey]);

      const saveContact = async () => {
        if (!addName.trim() || !addPhone.trim()) return;
        setSaving(true);
        const c = { id: uid(), name: addName.trim(), phone: addPhone.replace(/\D/g,'') };
        await contactUpsert(c);
        setRefreshKey(k => k + 1);
        onSelect(c.phone);
        setAddName(''); setAddPhone(''); setShowAdd(false); setSaving(false);
      };

      return (
        <div>
          <div className="flex items-center justify-between mb-1">
            <label className="text-sm font-medium text-gray-700">שליחה אל</label>
            <button onClick={() => setShowAdd(v => !v)}
              className={`flex items-center gap-1 text-xs px-2.5 py-1 rounded-lg font-medium
                         transition-colors ${showAdd
                           ? 'bg-gray-200 text-gray-600'
                           : 'bg-gray-100 text-gray-700 hover:bg-gray-100'}`}>
              {showAdd ? '✕ ביטול' : '+ איש קשר חדש'}
            </button>
          </div>

          {showAdd ? (
            <div className="bg-gray-50 rounded-xl p-3 space-y-2">
              <input autoFocus placeholder="שם" value={addName}
                onChange={e => setAddName(e.target.value)}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                           focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white" />
              <input placeholder="מספר טלפון" value={addPhone}
                onChange={e => setAddPhone(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && saveContact()}
                dir="ltr"
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                           focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white" />
              <button onClick={saveContact}
                disabled={saving || !addName.trim() || !addPhone.trim()}
                className="w-full py-2 bg-gray-900 text-white rounded-lg text-sm font-medium
                           hover:bg-gray-700 disabled:opacity-50 transition-colors">
                {saving ? 'שומר...' : 'שמור ובחר'}
              </button>
            </div>
          ) : (
            <>
              <ContactPicker key={refreshKey} onSelect={(num) => onSelect(num)} />
              {sendError && <p className="text-red-500 text-sm mt-1 text-center">{sendError}</p>}
            </>
          )}
        </div>
      );
    }

    // קומפוננטה: WhatsAppModal
    // ─────────────────────────────────────────
    // SERVER URL – saved in localStorage (synced from Supabase on load)
    const getToken  = () => localStorage.getItem('kshop_api_token') || '';

    const getServer = () =>
      localStorage.getItem('kshop_server_url') ||
      (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost:3001'
        : '');
    const NGROK_HEADER = {};

    function WhatsAppModal({ products, onClose, isCustomerMode = false }) {
      const { useEffect } = React;
      const [serverStatus, setServerStatus] = useState('checking'); // checking|ready|qr|disconnected
      const [phone,        setPhone]        = useState('');
      const [manualPhone,  setManualPhone]  = useState('');
      const [sending,      setSending]      = useState(false);
      const [progress,     setProgress]     = useState(null);
      const [done,         setDone]         = useState(false);
      const [sendError,    setSendError]    = useState('');
      const [textCopied,   setTextCopied]   = useState(false);

      const text = buildWhatsAppText(products);
      const businessNumber = localStorage.getItem('kshop_whatsapp_number') || '';
      const srv = getServer();

      // בדוק אם השרת רץ
      useEffect(() => {
        if (!srv) { setServerStatus('no_server'); return; }
        fetch(srv + '/status', { signal: AbortSignal.timeout(6000), headers: { 'ngrok-skip-browser-warning': 'true', 'x-kshop-token': getToken() } })
          .then(r => r.json())
          .then(d => setServerStatus(d.status === 'ready' ? 'ready' : d.status === 'qr' ? 'qr' : 'disconnected'))
          .catch(() => setServerStatus('disconnected'));
      }, []);

      // ── שליחה אוטומטית ──────────────────────────────────
      const autoSend = async () => {
        const cleaned = phone.replace(/\D/g, '');
        if (cleaned.length < 9) { setSendError('הזן מספר טלפון תקין'); return; }
        setSending(true); setSendError(''); setDone(false);

        const images = products.map(p => ({
          name: p.name,
          url:    p.image?.startsWith('http')  ? p.image : null,
          base64: p.image?.startsWith('data:') ? p.image : null,
        }));

        setProgress({ label: 'שולח הודעה...', done: 0, total: images.length + 1 });

        try {
          const resp = await fetch(srv + '/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true', 'x-kshop-token': getToken() },
            body: JSON.stringify({ phone, text, images }),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || 'שגיאה בשליחה');
          setDone(true);
          setProgress(null);
        } catch (e) {
          setSendError(e.message);
        } finally {
          setSending(false);
        }
      };

      // ── fallback: העתק טקסט + פתח WA ──────────────────
      const copyText = () =>
        navigator.clipboard.writeText(text)
          .then(() => { setTextCopied(true); setTimeout(() => setTextCopied(false), 2500); });

      const openWA = () => {
        const target = manualPhone || (isCustomerMode ? businessNumber : '');
        window.open('https://wa.me/' + target + '?text=' + encodeURIComponent(text), '_blank');
      };

      // ── Render ──────────────────────────────────────────
      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-3 sm:p-6 modal-backdrop"
             onClick={onClose}>
          <div className="bg-white rounded-2xl w-full max-w-md max-h-[92vh] overflow-y-auto modal-panel"
               onClick={e => e.stopPropagation()}>

            {/* Header */}
            <div className="flex items-center justify-between px-5 py-4 border-b">
              <div>
                <h2 className="font-bold text-lg text-gray-800 flex items-center gap-2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#25D366">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
                </svg>
                שליחה בוואטסאפ
              </h2>
                <p className="text-xs mt-0.5">
                  {serverStatus === 'checking'     && <span className="text-gray-400">⏳ בודק חיבור לשרת...</span>}
                  {serverStatus === 'ready'        && <span className="text-green-600 font-medium">✅ מחובר – שליחה אוטומטית</span>}
                  {serverStatus === 'qr'           && <span className="text-blue-500 font-medium">📱 ממתין לסריקת QR</span>}
                  {serverStatus === 'disconnected' && <span className="text-orange-500">⚠️ שרת לא פועל – מצב ידני</span>}
                  {serverStatus === 'no_server'    && <span className="text-gray-400">לא הוגדר שרת – הגדר בהגדרות</span>}
                </p>
              </div>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-xl text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
              </button>
            </div>

            {/* ══ QR – צריך לחבר וואטסאפ ══ */}
            {serverStatus === 'qr' && <QRPanel serverUrl={srv} onConnected={() => setServerStatus('ready')} />}

            {/* ══ מצב אוטומטי (שרת מחובר) ══ */}
            {serverStatus === 'ready' && !done && (
              <div className="p-5 space-y-4">

                {/* תצוגת מוצרים */}
                <div className="grid grid-cols-4 gap-2">
                  {products.map(p => (
                    <div key={p.id} className="text-center">
                      <div className="aspect-square rounded-xl overflow-hidden bg-gray-100">
                        {p.image
                          ? <img src={p.image} alt={p.name} className="w-full h-full object-cover" />
                          : <div className="w-full h-full flex items-center justify-center text-2xl text-gray-200">🎈</div>}
                      </div>
                      <p className="text-xs text-gray-400 mt-1 truncate">{p.name}</p>
                    </div>
                  ))}
                </div>

                {/* טקסט preview */}
                <div className="bg-[#dcf8c6] rounded-xl px-4 py-3 text-xs text-gray-700
                                whitespace-pre-wrap leading-relaxed border border-green-200 max-h-32 overflow-y-auto">
                  {text}
                </div>

                {/* בחירת איש קשר */}
                <ContactPickerWithAdd
                  onSelect={(num) => { setPhone(num); setSendError(''); }}
                  sendError={sendError}
                />

                {/* Progress bar */}
                {sending && progress && (
                  <div className="bg-gray-50 rounded-xl p-3">
                    <p className="text-sm text-gray-600 mb-2 text-center">{progress.label}</p>
                    <div className="w-full bg-gray-200 rounded-full h-2">
                      <div className="bg-green-500 h-2 rounded-full transition-all duration-500"
                           style={{ width: progress.total > 0 ? `${(progress.done/progress.total)*100}%` : '20%' }} />
                    </div>
                  </div>
                )}

                {/* כפתור שלח */}
                <button
                  onClick={autoSend}
                  disabled={sending || !phone.trim()}
                  className="w-full py-4 rounded-xl bg-[#25D366] hover:bg-[#20c05c] text-white
                             font-bold text-base transition-colors shadow-md disabled:opacity-50
                             disabled:cursor-not-allowed flex items-center justify-center gap-2">
                  {sending
                    ? <><span className="animate-spin">⏳</span> שולח...</>
                    : <>שלח הכל ({products.length} מוצרים)</>}
                </button>
              </div>
            )}

            {/* ══ הצלחה ══ */}
            {done && (
              <div className="p-8 text-center">
                <div className="text-6xl mb-4">✅</div>
                <p className="font-bold text-lg text-gray-800 mb-1">נשלח בהצלחה!</p>
                <p className="text-gray-500 text-sm mb-6">
                  טקסט + {products.length} תמונות נשלחו לוואטסאפ
                </p>
                <button onClick={onClose}
                  className="bg-gray-900 text-white px-8 py-2.5 rounded-xl font-medium hover:bg-gray-700">
                  סגור
                </button>
              </div>
            )}

            {/* ══ מצב ידני (שרת לא פועל / לא מוגדר) ══ */}
            {(serverStatus === 'disconnected' || serverStatus === 'no_server') && (
              <div className="p-5 space-y-4">

                {/* הסבר */}
                <div className="bg-orange-50 border border-orange-200 rounded-xl p-4 text-sm">
                  <p className="font-semibold text-orange-700 mb-1">⚠️ שרת וואטסאפ לא פעיל</p>
                  <p className="text-orange-600 text-xs">
                    {!getServer()
                      ? 'הגדר כתובת שרת בהגדרות (⚙️) כדי לשלוח אוטומטית.'
                      : 'וודא שמחשב המשרד דלוק וה-ngrok פועל, ורענן את הדף.'}
                  </p>
                </div>

                {/* בחירת איש קשר במצב ידני */}
                <ContactPickerWithAdd onSelect={(num) => setManualPhone(num)} />

                {/* Fallback ידני */}
                <div>
                  <p className="text-sm font-medium text-gray-600 mb-2">טקסט לשליחה:</p>
                  <div className="bg-[#dcf8c6] rounded-xl px-4 py-3 text-sm text-gray-800
                                  whitespace-pre-wrap leading-relaxed border border-green-200 max-h-40 overflow-y-auto mb-3">
                    {text}
                  </div>
                  <div className="flex gap-2">
                    <button onClick={copyText}
                      className={`flex-1 py-2.5 rounded-xl text-sm font-semibold transition-colors
                        ${textCopied ? 'bg-green-500 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
                      {textCopied ? '✅ הועתק!' : 'העתק טקסט'}
                    </button>
                    <button onClick={openWA}
                      className="flex-1 py-2.5 rounded-xl bg-[#25D366] text-white text-sm font-semibold hover:bg-[#20c05c]">
                      פתח וואטסאפ
                    </button>
                  </div>
                </div>

                {/* תמונות */}
                <div>
                  <p className="text-xs text-gray-500 mb-2">תמונות – לחץ ימני ← העתק תמונה ← הדבק בוואטסאפ:</p>
                  <div className="grid grid-cols-4 gap-2">
                    {products.map(p => (
                      <div key={p.id}>
                        <div className="aspect-square rounded-xl overflow-hidden bg-gray-100">
                          {p.image
                            ? <img src={p.image} alt={p.name} className="w-full h-full object-cover cursor-context-menu" />
                            : <div className="w-full h-full flex items-center justify-center text-2xl text-gray-200">🎈</div>}
                        </div>
                        <p className="text-xs text-gray-400 mt-1 truncate text-center">{p.name}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* checking skeleton */}
            {serverStatus === 'checking' && (
              <div className="p-8 text-center text-gray-400">
                <div className="animate-spin text-3xl mb-3">⏳</div>
                <p className="text-sm">בודק חיבור לשרת...</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────
    // קומפוננטה: ProductForm (הוספה / עריכה)
    // ─────────────────────────────────────────
    const EMPTY_PRODUCT = () => ({
      id: uid(), name: '', category: 'bounce', dimensions: '',
      image: '', costPrice: '', warehouse: 'alishma_old',
      warehouse_qty: {}, quantity: 0, futureQty: 0, futureDate: '', sku: '', display_order: 0
    });

    function ProductForm({ product, onSave, onCancel, onDelete, warehouses = DEFAULT_WAREHOUSES }) {
      const isNew = !product;
      const [f, setF] = useState(() => {
        const base = isNew ? EMPTY_PRODUCT() : { ...product };
        return { ...base, warehouse_qty: getWqty(base) };
      });

      const set = (k, v) => setF(p => ({ ...p, [k]: v }));

      const handleImage = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 3 * 1024 * 1024) {
          alert('התמונה גדולה מדי (מעל 3MB). אנא דחס לפני ההעלאה.');
          return;
        }
        const reader = new FileReader();
        reader.onload = ev => set('image', ev.target.result);
        reader.readAsDataURL(file);
      };

      const submit = (e) => {
        e.preventDefault();
        if (!f.name.trim()) { alert('חובה להזין שם מוצר'); return; }
        const wqty = typeof f.warehouse_qty === 'object' ? f.warehouse_qty : {};
        const totalFromWqty = Object.values(wqty).reduce((a, b) => a + (Number(b) || 0), 0);
        // primary warehouse = highest qty
        const primary = Object.entries(wqty).sort((a, b) => b[1] - a[1])[0];
        onSave({ ...f,
          costPrice: Number(f.costPrice) || 0,
          quantity:  totalFromWqty || Number(f.quantity) || 0,
          futureQty: Number(f.futureQty) || 0,
          warehouse_qty: JSON.stringify(wqty),
          warehouse: (primary && primary[1] > 0) ? primary[0] : (f.warehouse || 'alishma_old'),
        });
      };

      const del = () => {
        if (window.confirm(`למחוק את "${f.name}"?`)) onDelete(f.id);
      };

      const inputCls = "w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm " +
                       "focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white";
      const labelCls = "block text-sm font-medium text-gray-700 mb-1";

      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-3 sm:p-6 modal-backdrop">
          <div className="bg-white rounded-2xl w-full max-w-md max-h-[92vh] overflow-y-auto modal-panel">

            {/* Header */}
            <div className="sticky top-0 bg-white flex items-center justify-between px-5 py-4 border-b z-10">
              <h2 className="font-bold text-lg text-gray-800">{isNew ? '+ מוצר חדש' : 'עריכת מוצר'}</h2>
              <button onClick={onCancel} className="w-8 h-8 flex items-center justify-center rounded-xl text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
              </button>
            </div>

            <form onSubmit={submit} className="px-5 py-4 space-y-4">

              {/* תמונה */}
              <div>
                <label className={labelCls}>תמונה</label>
                {f.image && (
                  <div className="relative inline-block mb-2">
                    <img src={f.image} className="w-28 h-28 object-cover rounded-xl border border-gray-200" />
                    <button type="button" onClick={() => set('image', '')}
                      className="absolute -top-1.5 -left-1.5 bg-red-500 text-white rounded-full
                                 w-5 h-5 text-xs flex items-center justify-center shadow">×</button>
                  </div>
                )}
                <input type="file" accept="image/*" onChange={handleImage} className="text-xs" />
                <p className="text-xs text-gray-400 mt-0.5">מומלץ: פחות מ-1MB לביצועים טובים</p>
              </div>

              {/* שם */}
              <div>
                <label className={labelCls}>שם המוצר *</label>
                <input type="text" placeholder="לדוגמה: ספיידרמן קפיצה"
                  value={f.name} onChange={e => set('name', e.target.value)}
                  className={inputCls} required />
              </div>

              {/* מק"ט */}
              <div>
                <label className={labelCls}>מק"ט (SKU)</label>
                <input type="text" placeholder="לדוגמה: BOUNCE-001"
                  value={f.sku || ''} onChange={e => set('sku', e.target.value)}
                  className={inputCls} />
              </div>

              {/* קטגוריה */}
              <div>
                <label className={labelCls}>קטגוריה</label>
                <select value={f.category} onChange={e => set('category', e.target.value)} className={inputCls}>
                  {CATEGORIES.filter(c => c.key !== 'all').map(c =>
                    <option key={c.key} value={c.key}>{c.label}</option>)}
                </select>
              </div>

              {/* מידות */}
              <div>
                <label className={labelCls}>מידות</label>
                <input type="text" placeholder="לדוגמה: 4×4 מטר"
                  value={f.dimensions} onChange={e => set('dimensions', e.target.value)}
                  className={inputCls} />
              </div>

              {/* מחיר עלות */}
              <div>
                <label className={labelCls}>מחיר עלות (פרטי) ₪</label>
                <input type="number" min="0" placeholder="0"
                  value={f.costPrice} onChange={e => set('costPrice', e.target.value)}
                  className={inputCls} />
              </div>

              {/* כמות לפי מחסן */}
              <div className="bg-gray-50 rounded-xl p-4 space-y-3">
                <p className="text-sm font-medium text-gray-700">📦 כמות לפי מחסן</p>
                {warehouses.map(w => {
                  const qty = (f.warehouse_qty || {})[w.key] || 0;
                  return (
                    <div key={w.key} className="flex items-center gap-3">
                      <span className="text-sm text-gray-600 flex-1 text-right">{w.label}</span>
                      <input type="number" min="0" value={qty}
                        onChange={e => {
                          const newQty = { ...(f.warehouse_qty || {}), [w.key]: parseInt(e.target.value) || 0 };
                          const total = Object.values(newQty).reduce((a, b) => a + (Number(b) || 0), 0);
                          set('warehouse_qty', newQty);
                          set('quantity', total);
                        }}
                        className="w-20 border border-gray-200 rounded-lg px-3 py-2 text-sm text-center
                                   focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white" />
                    </div>
                  );
                })}
                <div className="flex justify-between items-center pt-1 border-t border-gray-200">
                  <span className="text-xs text-gray-400">סה"כ</span>
                  <span className="font-bold text-gray-700 text-sm">
                    {Object.values(f.warehouse_qty || {}).reduce((a, b) => a + (Number(b) || 0), 0)} יחידות
                  </span>
                </div>
              </div>

              {/* מלאי עתידי */}
              <div className="bg-orange-50 rounded-xl p-4 space-y-3">
                <p className="text-sm font-medium text-orange-700">📦 מלאי עתידי (אופציונלי)</p>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">כמות שהוזמנה</label>
                    <input type="number" min="0" placeholder="0"
                      value={f.futureQty} onChange={e => set('futureQty', e.target.value)}
                      className="w-full border border-orange-200 rounded-lg px-3 py-2 text-sm
                                 focus:outline-none focus:ring-2 focus:ring-orange-300 bg-white" />
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">תאריך הגעה</label>
                    <input type="date"
                      value={f.futureDate} onChange={e => set('futureDate', e.target.value)}
                      className="w-full border border-orange-200 rounded-lg px-3 py-2 text-sm
                                 focus:outline-none focus:ring-2 focus:ring-orange-300 bg-white" />
                  </div>
                </div>
              </div>

              {/* כפתורי פעולה */}
              <div className="flex gap-2 pt-1 pb-2">
                {!isNew && (
                  <button type="button" onClick={del}
                    className="px-4 py-2.5 rounded-xl text-sm font-medium text-red-500
                               border border-red-200 hover:bg-red-50 transition-colors">
                    🗑️ מחק
                  </button>
                )}
                <button type="button" onClick={onCancel}
                  className="flex-1 py-2.5 rounded-xl bg-gray-100 text-gray-700 text-sm
                             font-medium hover:bg-gray-200 transition-colors">
                  ביטול
                </button>
                <button type="submit"
                  className="flex-1 py-2.5 rounded-xl bg-gray-900 text-white text-sm
                             font-semibold hover:bg-gray-700 transition-colors">
                  {isNew ? 'הוסף מוצר' : 'שמור שינויים'}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────
    // קומפוננטה: AddCategoryModal
    // ─────────────────────────────────────────
    function AddCategoryModal({ onClose, onAdd }) {
      const [label, setLabel] = useState('');
      const [err, setErr] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!label.trim()) { setErr('הזן שם קטגוריה'); return; }
        const key = label.trim().toLowerCase().replace(/\s+/g, '_');
        onAdd(key, label.trim());
        onClose();
      };

      return (

    const escHtml = (s) => String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

      { id: 'c2', text: 'ההצעה בתוקף ל-7 ימים', enabled: true },

      const phone = localStorage.getItem('kshop_whatsapp_number') || '972509933322';
      const displayPhone = (() => {
        const d = phone.replace(/\D/g, '');
        if (d.startsWith('972')) { const l = '0' + d.slice(3); return l.slice(0,3) + '-' + l.slice(3); }
        return phone;
      })();

      const calcPrice = (raw) => {
        const n = parseFloat(raw);
        if (isNaN(n) || raw === '') return '';
        return vatEnabled ? Math.round(n * 1.18) : Math.round(n);
      };

      const buildCatalog = () => {
        const catMap = {};
        products.forEach(p => {
          const key = p.category || '__none__';
          if (!catMap[key]) catMap[key] = [];
          catMap[key].push(p);
        });
        const catLabel = {};
        categories.forEach(c => { catLabel[c.key] = c.label; });

        let rowsHtml = '';
        let rowNum = 0;

          const label = catLabel[catKey] || (catKey === '__none__' ? '' : catKey);
          if (label) rowsHtml += '<tr class="pc-cat-row"><td colspan="5">' + escHtml(label) + '</td></tr>';
          prods.forEach(p => {
            rowNum++;

      const sendToWA = async () => {
        if (!waPhone.trim()) { setWaError('הזן מספר טלפון'); return; }
        const srv   = getServer();
        const token = getToken();
        if (!srv) { setWaError('הגדר כתובת שרת בהגדרות'); return; }
        setSendingWA(true); setWaError('');
        buildCatalog();
        try {
          const el = document.getElementById('kshop-print-catalog');
          const canvas = await window.html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#fff' });
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
          const imgData = canvas.toDataURL('image/jpeg', 0.92);
          const pdfW = pdf.internal.pageSize.getWidth();
          const pdfH = (canvas.height * pdfW) / canvas.width;
          pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, Math.min(pdfH, pdf.internal.pageSize.getHeight()));
          const pdfBase64 = pdf.output('datauristring');
          const resp = await fetch(srv + '/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-kshop-token': token, 'ngrok-skip-browser-warning': 'true' },
            body: JSON.stringify({ phone: waPhone, text: '📋 מחירון מצורף', images: [{ name: 'מחירון.pdf', base64: pdfBase64 }] })
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || 'שגיאה בשליחה');
          setWaDone(true);
        } catch(e) { setWaError(e.message); }
        finally { setSendingWA(false); }
      };

      const toggleClause = (id) => setClauses(prev => prev.map(c => c.id === id ? { ...c, enabled: !c.enabled } : c));
      const addClause = () => {
        if (!newClause.trim()) return;
        setClauses(prev => [...prev, { id: 'c' + Date.now(), text: newClause.trim(), enabled: true }]);
        setNewClause('');
      };
      const removeClause = (id) => setClauses(prev => prev.filter(c => c.id !== id));

      return (

                      <button onClick={() => removeClause(c.id)}

                  ))}

                <div className="flex gap-2 mt-2.5">
                  <input type="text" placeholder="הוסף משפט חדש..." value={newClause}
                    onChange={e => setNewClause(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && addClause()}
                    className="flex-1 border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-red-300" />

              {/* שליחה לוואטסאפ */}
              {showWaSend && !waDone && (
                <div className="border border-green-200 bg-green-50 rounded-xl p-3 space-y-2">
                  <p className="text-xs font-semibold text-green-700">📱 שלח PDF לוואטסאפ</p>
                  <input type="tel" placeholder="מספר טלפון (0501234567)" value={waPhone}
                    onChange={e => setWaPhone(e.target.value)}
                    className="w-full border border-green-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-300"
                    dir="ltr" />
                  {waError && <p className="text-xs text-red-500">{waError}</p>}
                  <button onClick={sendToWA} disabled={sendingWA}
                    className="w-full py-2.5 rounded-xl bg-green-600 hover:bg-green-700 disabled:opacity-50 text-white text-sm font-bold flex items-center justify-center gap-2">
                    {sendingWA ? '⏳ שולח...' : '📤 שלח עכשיו'}
                  </button>

              {waDone && (
                <div className="bg-green-50 border border-green-200 rounded-xl p-3 text-center">
                  <p className="text-green-700 font-bold text-sm">✅ המחירון נשלח בוואטסאפ!</p>
                </div>
              )}
            </div>

            <div className="px-5 py-4 border-t border-gray-100 flex gap-2">
              <button onClick={onClose}
                className="px-4 py-3 rounded-xl border border-gray-200 text-gray-500 text-sm font-medium hover:bg-gray-50">
                ביטול
              </button>
              <button onClick={() => { setShowWaSend(v => !v); setWaDone(false); setWaError(''); }}
                className="flex-1 py-3 rounded-xl bg-green-500 hover:bg-green-600 text-white text-sm font-bold flex items-center justify-center gap-2">
                💬 שלח לוואטסאפ
              </button>
              <button onClick={doPrint}
                className="flex-1 py-3 rounded-xl bg-[#cc0000] hover:bg-[#aa0000] text-white text-sm font-bold flex items-center justify-center gap-2 shadow-md">

              </button>
            </div>
          </div>
        </div>
      );
    }


    // קומפוננטה: SettingsModal
    // ─────────────────────────────────────────
    function SettingsModal({ onClose, onLogout, warehouses = DEFAULT_WAREHOUSES, onSaveWarehouses, logoUrl = '', onSaveLogo }) {
      const [newPw, setNewPw] = useState('');
      const [conf, setConf]   = useState('');
      const [msg, setMsg]     = useState('');
      const [whatsappNum, setWhatsappNum] = useState(() => localStorage.getItem('kshop_whatsapp_number') || '972509933322');
      const [serverUrl, setServerUrl] = useState(() => localStorage.getItem('kshop_server_url') || '');
      const [apiToken,   setApiToken]   = useState(() => localStorage.getItem('kshop_api_token')  || '');
      const [contacts, setContacts]   = useState([]);
      const [newCName, setNewCName]   = useState('');
      const [newCPhone, setNewCPhone] = useState('');
      const [addingC, setAddingC]     = useState(false);
      const [showContacts, setShowContacts] = useState(false);
      const [showWarehouses, setShowWarehouses] = useState(false);
      const [newWhLabel, setNewWhLabel] = useState('');
      const importRef         = useRef();

      useEffect(() => { contactsLoad().then(setContacts); }, []);

      const changePw = async (e) => {
        e.preventDefault();
        if (newPw.length < 6) { setMsg('❌ סיסמה חייבת להיות לפחות 6 תווים'); return; }
        if (newPw !== conf)   { setMsg('❌ הסיסמאות לא תואמות'); return; }
        const { error } = await db.auth.updateUser({ password: newPw });
        if (error) { setMsg('❌ שגיאה: ' + error.message); return; }
        setMsg('✅ הסיסמה עודכנה בהצלחה!');
        setNewPw(''); setConf('');
      };

      const exportData = () => {
        const data = JSON.stringify(loadProducts(), null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        const date = new Date().toLocaleDateString('he-IL').replace(/\//g,'-');
        a.href = url; a.download = `kshop-backup-${date}.json`;
        a.click(); URL.revokeObjectURL(url);
      };

      const importData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!Array.isArray(data)) throw new Error('invalid');
            persistProducts(data);
            alert(`יובאו ${data.length} מוצרים בהצלחה!\nרענן את הדף (F5) כדי לראות אותם.`);
            onClose();
          } catch { alert('קובץ לא תקין. ודא שזהו קובץ גיבוי של K-Shop.'); }
        };
        reader.readAsText(file);
      };

      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 modal-backdrop"
             onClick={onClose}>
          <div className="bg-white rounded-2xl w-full max-w-sm p-6 max-h-[90vh] overflow-y-auto modal-panel"
               onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-5">
              <h2 className="font-bold text-lg text-gray-800 flex items-center gap-2">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
              </svg>
              הגדרות
            </h2>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-xl text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
              </button>
            </div>

            {/* לוגו העסק */}

              {logoUrl && (
                <div className="flex items-center gap-3">
                  <img src={logoUrl} alt="לוגו" className="h-12 rounded border border-orange-200 bg-white p-1" />
                  <button onClick={() => onSaveLogo && onSaveLogo('')}
                    className="text-xs text-red-400 hover:text-red-600">הסר</button>
                </div>
              )}
              <label className="block w-full py-2 text-center rounded-xl bg-orange-400 text-white text-sm
                               font-medium hover:bg-orange-500 transition-colors cursor-pointer">

                <input type="file" accept="image/*" className="hidden" onChange={e => {
                  const file = e.target.files[0];
                  if (!file) return;
                  const reader = new FileReader();
                  reader.onload = ev => {
                    if (onSaveLogo) onSaveLogo(ev.target.result);
                    setMsg('✅ לוגו נשמר!');
                    setTimeout(() => setMsg(''), 2500);
                  };
                  reader.readAsDataURL(file);
                }} />
              </label>
            </div>

            {/* כתובת שרת וואטסאפ */}

              <p className="text-xs text-gray-700">הכתובת של ngrok (לדוגמה: https://landmine-thumb-stegosaur.ngrok-free.app)</p>
              <input
                type="url"
                placeholder="https://xxxx.ngrok-free.app"
                value={serverUrl}
                onChange={e => setServerUrl(e.target.value)}
                dir="ltr"
                className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm
                           focus:outline-none focus:ring-2 focus:ring-gray-400"
              />
              <button onClick={async () => {
                const url = serverUrl.replace(/\/$/, '');
                localStorage.setItem('kshop_server_url', url);
                // שמור גם לסופאבייס כדי שכל המכשירים ידעו
                try {
                  await db.from('app_settings').upsert({ key: 'serverURL', value: JSON.stringify(url) }, { onConflict: 'key' });
                  setMsg('✅ כתובת שרת נשמרה – כל המכשירים יתעדכנו!');
                } catch {
                  setMsg('✅ נשמר מקומית');
                }
                setTimeout(() => setMsg(''), 3000);
              }}
                className="w-full py-2 rounded-xl bg-gray-900 text-white text-sm
                           font-medium hover:bg-gray-700 transition-colors">
                💾 שמור כתובת
              </button>
            </div>

            {/* 🔑 Token אבטחה */}
            <div className="bg-red-50 rounded-xl p-4 mb-4 space-y-2">
              <p className="text-sm font-semibold text-red-700">🔑 קוד אבטחה (API Token)</p>
              <p className="text-xs text-red-500">מופיע בחלון השרת בעת ההפעלה – העתק אותו לכאן</p>
              <input
                type="text"
                placeholder="הדבק כאן את ה-Token מחלון השרת"
                value={apiToken}
                onChange={e => setApiToken(e.target.value)}
                dir="ltr"
                className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm font-mono
                           focus:outline-none focus:ring-2 focus:ring-red-300"
              />
              <button onClick={() => {
                localStorage.setItem('kshop_api_token', apiToken.trim());
