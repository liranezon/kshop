                setTimeout(() => setMsg(''), 2500);
              }}
                className="w-full py-2 rounded-xl bg-red-500 text-white text-sm
                           font-medium hover:bg-red-600 transition-colors">
                💾 שמור Token
              </button>
            </div>

            {/* מספר וואטסאפ של העסק */}
            <div className="bg-green-50 rounded-xl p-4 mb-5 space-y-2">
              <p className="text-sm font-semibold text-green-700">מספר וואטסאפ של העסק</p>
              <p className="text-xs text-green-600">
                מספר זה יופיע בהודעות וואטסאפ מלקוחות. עיצוב: 972XXXXXXXXX (ללא +)
              </p>
              <input
                type="tel"
                placeholder="972XXXXXXXXX"
                value={whatsappNum}
                onChange={e => setWhatsappNum(e.target.value)}
                className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm
                           focus:outline-none focus:ring-2 focus:ring-green-300"
              />
              <button onClick={() => {
                localStorage.setItem('kshop_whatsapp_number', whatsappNum);
                setMsg('✅ מספר וואטסאפ עודכן בהצלחה!');
                setTimeout(() => setMsg(''), 2500);
              }}
                className="w-full py-2 rounded-xl bg-green-500 text-white text-sm
                           font-medium hover:bg-green-600 transition-colors">
                💾 שמור
              </button>
            </div>

            {/* אנשי קשר */}
            <div className="mb-5">
              <button onClick={() => setShowContacts(v => !v)}
                className="w-full flex items-center justify-between text-sm font-semibold
                           text-gray-700 py-2">
                <span>👥 אנשי קשר ({contacts.length})</span>
                <span className="text-gray-400 text-xs">{showContacts ? '▲' : '▼'}</span>
              </button>

              {showContacts && (
                <div className="mt-2 space-y-2">
                  {/* ייבוא מוואטסאפ */}
                  {(() => {
                    const srv = localStorage.getItem('kshop_server_url');
                    if (!srv) return null;
                    return (
                      <button onClick={async () => {
                        setMsg('⏳ מייבא מוואטסאפ...');
                        try {
                          const r = await fetch(srv + '/contacts', {
                            headers: { 'ngrok-skip-browser-warning': 'true', 'x-kshop-token': getToken() }
                          });
                          const data = await r.json();
                          const incoming = data.contacts || [];
                          // phone = ID קבוע → upsert מונע כפולות אוטומטית
                          const toUpsert = incoming
                            .filter(c => c.phone && c.name)
                            .map(c => ({ id: c.phone, name: c.name, phone: c.phone }));
                          for (const c of toUpsert) await contactUpsert(c);
                          const updated = await contactsLoad();
                          setContacts(updated);
                          const existingPhones = new Set(contacts.map(x => x.phone));
                          const newCount = toUpsert.filter(x => !existingPhones.has(x.phone)).length;
                          setMsg(`✅ יובאו ${newCount} קשרים חדשים (${toUpsert.length} סה"כ)`);
                          setTimeout(() => setMsg(''), 4000);
                        } catch(e) {
                          setMsg('❌ שגיאה: ' + e.message);
                          setTimeout(() => setMsg(''), 3000);
                        }
                      }}
                        className="w-full py-2 bg-green-500 text-white rounded-xl text-sm
                                   font-medium hover:bg-green-600 transition-colors flex items-center
                                   justify-center gap-2">
                        📲 ייבא קשרים מוואטסאפ
                      </button>
                    );
                  })()}
                  {contacts.length > 0 && (
                    <button onClick={async () => {
                      if (!confirm(`למחוק את כל ${contacts.length} אנשי הקשר?`)) return;

                      setContacts([]);
                      setMsg('🗑 כל אנשי הקשר נמחקו');
                      setTimeout(() => setMsg(''), 2500);
                    }}
                      className="w-full py-2 bg-red-50 text-red-500 border border-red-200 rounded-xl
                                 text-sm font-medium hover:bg-red-100 transition-colors">
                      🗑 מחק את כל אנשי הקשר ({contacts.length})
                    </button>
                  )}
                  {contacts.length === 0 && (
                    <p className="text-xs text-gray-400 text-center py-2">אין אנשי קשר עדיין</p>

                  {contacts.map(c => (
                    <div key={c.id} className="flex items-center gap-2 bg-gray-50 rounded-xl px-3 py-2">

                      <button onClick={async () => {
                        await contactDelete(c.id);

                    <p className="text-xs font-medium text-gray-700">+ הוסף איש קשר</p>
                    <input placeholder="שם" value={newCName} onChange={e => setNewCName(e.target.value)}
                      className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                                 focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white" />
                    <input placeholder="מספר טלפון" value={newCPhone} onChange={e => setNewCPhone(e.target.value)}

                      className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                                 focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white" />
                    <button disabled={addingC || !newCName.trim() || !newCPhone.trim()}
                      onClick={async () => {
                        setAddingC(true);
                        const phone = newCPhone.replace(/\D/g,'');
                        const c = { id: phone, name: newCName.trim(), phone };
                        await contactUpsert(c);
                        setContacts(prev => [...prev, c].sort((a,b) => a.name.localeCompare(b.name, 'he')));
                        setNewCName(''); setNewCPhone(''); setAddingC(false);
                      }}
                      className="w-full py-2 bg-gray-900 text-white rounded-lg text-sm
                                 font-medium hover:bg-gray-700 disabled:opacity-50 transition-colors">
                      {addingC ? 'שומר...' : 'הוסף'}

                </div>
              )}
            </div>

                <span>🏭 מחסנים ({warehouses.length})</span>
                <span className="text-gray-400 text-xs">{showWarehouses ? '▲' : '▼'}</span>
              </button>

                <div className="mt-2 space-y-2">

                    <div key={w.key} className="flex items-center gap-2 bg-gray-50 rounded-xl px-3 py-2">
                      <span className="text-lg">🏭</span>
                      <span className="flex-1 text-sm font-medium text-gray-800">{w.label}</span>
                      {warehouses.length > 1 && (
                        <button onClick={() => {

                      onKeyDown={e => {
                        if (e.key === 'Enter' && newWhLabel.trim()) {
                          const key = newWhLabel.trim().toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '') + '_' + Date.now();

                          setTimeout(() => setMsg(''), 2000);

                      className="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm

                      onClick={() => {
                        if (!newWhLabel.trim()) return;

                        setNewWhLabel('');
                        setMsg('✅ מחסן נוסף!');
                        setTimeout(() => setMsg(''), 2000);

            {/* שינוי סיסמה */}

                onChange={e => setConf(e.target.value)}

            <button onClick={onLogout}
              className="w-full py-2.5 rounded-xl border border-red-200 text-red-500 text-sm

          </div>

      );
    }

    // ─────────────────────────────────────────
    // קומפוננטה ראשית: App
    // ─────────────────────────────────────────
    // ─────────────────────────────────────────
    // קומפוננטה: Toast
    // ─────────────────────────────────────────
    function Toast({ toasts }) {
      return (
        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[9999] flex flex-col items-center gap-2 pointer-events-none"
             style={{ direction: 'rtl' }}>
          {toasts.map(t => (
            <div key={t.id}
                 className={`${t.exiting ? 'toast-exit' : 'toast-enter'}
                   flex items-center gap-2.5 px-4 py-2.5 rounded-xl shadow-lg text-sm font-semibold
                   pointer-events-auto select-none min-w-[180px] max-w-[320px]
                   ${t.type === 'error'   ? 'bg-red-600 text-white' :
                     t.type === 'warning' ? 'bg-amber-500 text-white' :
                                            'bg-gray-900 text-white'}`}>
              <span className="flex-shrink-0 text-base">
                {t.type === 'error' ? '⚠️' : t.type === 'warning' ? '⚡' : '✓'}
              </span>
              {t.msg}
            </div>
          ))}
        </div>
      );
    }

        function App() {
      const [loggedIn,    setLoggedIn]    = useState(false);
      const [products,    setProducts]    = useState([]);
      const [selectedIds, setSelectedIds] = useState(new Set());

      const [showSettings,setShowSettings]= useState(false);
      const [categories,  setCategories]  = useState([]);
      const [warehouses,  setWarehouses]  = useState(DEFAULT_WAREHOUSES);
      const [showAddCategory, setShowAddCategory] = useState(false);
      const [draggedProduct, setDraggedProduct] = useState(null);
      const [syncStatus, setSyncStatus] = useState('ok'); // ok | syncing | error
      const [logoUrl,     setLogoUrl]     = useState('');
      const [showPricing, setShowPricing] = useState(false);
      const [initialLoading, setInitialLoading] = useState(true); // מחכה לטעינה ראשונית מהענן
      const [toasts, setToasts] = useState([]);

      const showToast = React.useCallback((msg, type = 'success') => {
        const id = Date.now() + Math.random();
        setToasts(prev => [...prev, { id, msg, type, exiting: false }]);
        setTimeout(() => {
          setToasts(prev => prev.map(t => t.id === id ? { ...t, exiting: true } : t));
          setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 250);
        }, 2800);
      }, []);

      // פונקציה לטעינת נתוני ענן ועדכון state
      const applyCloudData = (data) => {
        if (data && data.products && data.products.length > 0) {
          setProducts(data.products);
          persistProducts(data.products);
          const cloudCats = data.categories && data.categories.length > 0 ? data.categories : CATEGORIES;
          setCategories(cloudCats);
          localStorage.setItem('kshop_categories', JSON.stringify(cloudCats));
          const cloudWhs = data.warehouses && data.warehouses.length > 0 ? data.warehouses : DEFAULT_WAREHOUSES;
          setWarehouses(cloudWhs);
          localStorage.setItem('kshop_warehouses', JSON.stringify(cloudWhs));
          if (data.whatsappNumber) localStorage.setItem('kshop_whatsapp_number', data.whatsappNumber);
          if (data.logoUrl) setLogoUrl(data.logoUrl);
        }
      };

      useEffect(() => {
        // ── טען מהענן תמיד ראשון — הענן הוא מקור האמת ──────────────
        setSyncStatus('syncing');
        cloudLoad().then(data => {
          applyCloudData(data);
          cloudDataLoaded = true; // רק עכשיו מותר לשמור
          setSyncStatus('ok');
          setInitialLoading(false);
        }).catch(() => {
          // אם הענן נכשל — טען מ-localStorage כגיבוי
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) { try { setProducts(JSON.parse(saved)); } catch {} }
          setCategories(CATEGORIES);
          cloudDataLoaded = true;
          setSyncStatus('error');
          setInitialLoading(false);
        });

        // ── שחזר session קיים של Supabase Auth ──────────────
        db.auth.getSession().then(({ data: { session } }) => {
          if (session) { setLoggedIn(true); setAdminMode(true); }
        });

        // הקשב לשינויי auth (login/logout)
        const { data: { subscription } } = db.auth.onAuthStateChange((event, session) => {
          if (event === 'SIGNED_OUT' || !session) {
            setLoggedIn(false);
            setAdminMode(false);
          } else if (session) {
            setLoggedIn(true);
          }
        });

        return () => subscription.unsubscribe();
      }, []);

      const save = (list) => { setProducts(list); persistProducts(list); debouncedCloudSave(list); };

      const saveCategories = (cats) => {
        setCategories(cats);
        localStorage.setItem('kshop_categories', JSON.stringify(cats));
        debouncedCloudSave(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'), cats);
      };

      const saveWarehouses = async (whs) => {
        setWarehouses(whs);
        localStorage.setItem('kshop_warehouses', JSON.stringify(whs));
        const { data: { session } } = await db.auth.getSession();
        if (session) {
          db.from('app_settings').upsert({ key: 'warehouses', value: JSON.stringify(whs) }, { onConflict: 'key' });
        }
      };

      const saveLogo = async (b64) => {
        setLogoUrl(b64);
        try {
          const { data: { session } } = await db.auth.getSession();
          if (session) {
            await db.from('app_settings').upsert({ key: 'logoUrl', value: JSON.stringify(b64) }, { onConflict: 'key' });
          }

        return true;

        cloudDeleteProduct(id); // מחק מהענן במפורש

        setShowForm(false); setEditProduct(null);

      const handleQuantityChange = (id, delta, warehouseKey = null) => {
        save(products.map(p => {
          if (p.id !== id) return p;
          const newTotal = Math.max(0, (p.quantity || 0) + delta);
          if (warehouseKey) {
            const wqty = getWqty(p);
            const newWqty = { ...wqty, [warehouseKey]: Math.max(0, (wqty[warehouseKey] || 0) + delta) };
            return { ...p, quantity: newTotal, warehouse_qty: JSON.stringify(newWqty) };
          }
          return { ...p, quantity: newTotal };
        }));
      };

      const openEdit = (product) => { setEditProduct(product); setShowForm(true); };
      const openNew  = ()         => { setEditProduct(null);   setShowForm(true); };
      const logout   = async ()   => {

      // Dragging handlers

        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';

        e.preventDefault();
        if (!draggedProduct || draggedProduct.id === targetProduct.id) {
          setDraggedProduct(null);
          return;
        }

        // Reorder products by swapping indices
        const draggedIdx = products.findIndex(p => p.id === draggedProduct.id);
        const targetIdx = products.findIndex(p => p.id === targetProduct.id);
        if (draggedIdx === -1 || targetIdx === -1) {
          setDraggedProduct(null);
          return;
        }

        const newProducts = [...products];
        [newProducts[draggedIdx], newProducts[targetIdx]] = [newProducts[targetIdx], newProducts[draggedIdx]];
        save(newProducts);
        setDraggedProduct(null);

                  {products.length === 0 ? 'הוסף את המוצר הראשון שלך כדי להתחיל' : 'נסה מילת חיפוש אחרת'}
                </p>
                {products.length === 0 && adminMode && (
                  <button onClick={openNew}
                    className="bg-gray-900 hover:bg-gray-700 text-white px-6 py-2.5
                               rounded-xl font-semibold text-sm transition-colors">
                    + הוסף מוצר ראשון
                  </button>
                )}
              </div>
            ) : (
              <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
                {filtered.map(p => (
                  <ProductCard
                    warehouses={warehouses}
                    key={p.id}
                    product={p}
                    selected={selectedIds.has(p.id)}
                    onToggle={toggleSelect}
                    adminMode={adminMode}
                    onEdit={openEdit}
                    onQuantityChange={handleQuantityChange}
                    onDragStart={handleDragStart}
                    onDragOver={handleDragOver}
                    onDrop={handleDrop}
                  />
                ))}
              </div>
            )}
          </main>

          {/* ── Bottom bar (כשיש בחירה) ── */}
          {selectedIds.size > 0 && (
            <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-20
                            shadow-[0_-4px_20px_rgba(0,0,0,0.08)]">
              <div className="max-w-4xl mx-auto px-4 py-3 flex items-center gap-3">
                <button
                  onClick={() => setSelectedIds(new Set())}
                  title="בטל בחירה"
                  className="flex-shrink-0 w-9 h-9 flex items-center justify-center rounded-full
                             bg-gray-100 hover:bg-red-100 text-gray-400 hover:text-red-500
                             transition-colors text-lg font-bold">
                  ✕
                </button>
                <div className="flex-1 min-w-0">
                  <p className="font-bold text-gray-800 text-sm">
                    {selectedIds.size} מוצרים נבחרו
                  </p>
                  <p className="text-xs text-gray-400 truncate">
                    {selectedProducts.map(p => p.name).join('  ·  ')}
                  </p>
                </div>
                {adminMode && (
                  <button
                    onClick={() => setShowPricing(true)}
                    className="flex-shrink-0 bg-gray-900 hover:bg-gray-700 text-white px-4 py-3
                               rounded-xl font-bold text-sm flex items-center gap-2 shadow-md
                               transition-colors">
                    📄 מחירון
                  </button>
                )}
                <button
                  onClick={adminMode ? () => setShowWA(true) : openCustomerWA}
                  className="flex-shrink-0 bg-[#25D366] hover:bg-[#20c05c] text-white px-5 py-3
                             rounded-xl font-bold text-sm flex items-center gap-2 shadow-md
                             transition-colors">
                  <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
                    </svg>
                    {adminMode ? 'שלח בוואטסאפ' : 'שלח לנו וואטסאפ'}
                </button>
              </div>
            </div>
          )}

          {/* ── Toast Notifications ── */}
          <Toast toasts={toasts} />

          {/* ── Customer Mode Footer (הנחיה לבחור מוצרים) ── */}
          {!adminMode && selectedIds.size === 0 && (
            <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-20
                            shadow-[0_-4px_20px_rgba(0,0,0,0.08)]">
              <div className="max-w-4xl mx-auto px-4 py-4 flex items-center justify-center gap-3">
                <div className="flex items-center gap-2 text-gray-400 text-sm">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                  </svg>
                  בחר מוצרים ושלח לנו וואטסאפ
                </div>
              </div>
            </div>
          )}

          {/* ── Modals ── */}
          {showWA && (
            <WhatsAppModal
              products={selectedProducts}
              onClose={() => setShowWA(false)}
              isCustomerMode={!adminMode}
            />
          )}
          {showForm && (
            <ProductForm
              product={editProduct}
              onSave={handleSave}
              onCancel={() => { setShowForm(false); setEditProduct(null); }}
              onDelete={handleDelete}
              warehouses={warehouses}
            />
          )}
          {showAddCategory && (
            <AddCategoryModal
              onClose={() => setShowAddCategory(false)}
              onAdd={addCategory}
            />
          )}
          {showSettings && (
            <SettingsModal onClose={() => setShowSettings(false)} onLogout={logout} warehouses={warehouses} onSaveWarehouses={saveWarehouses} logoUrl={logoUrl} onSaveLogo={saveLogo} />
          )}
          {showPricing && (
            <PricingModal
              products={selectedProducts}
              logoUrl={logoUrl}
              categories={categories}
              onClose={() => setShowPricing(false)}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
